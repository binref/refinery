name: "Python Test"
description: "Python Test Template"
inputs:
  py:
    required: true
    description: "Target Python Version"
  os:
    required: true
    description: "Target Operating System"
runs:
  using: "composite"
  steps:
    - name: Disable Compiled Modules
      shell: ${{ contains(inputs.os, 'windows') && 'pwsh' || 'bash' }}
      run: python setup.py disable_ext
    - name: Unit Tests (Pure Python)
      if: ${{ contains(inputs.os, 'windows') }}
      shell: cmd
      run: pytest -n=8 --dist=worksteal -m "not cythonized_only" test 2>NUL
    - name: Unit Tests (Pure Python)
      if: ${{ contains(inputs.os, 'mac') }}
      shell: bash
      run: pytest -n=8 --dist=worksteal -m "not cythonized_only" test
    - name: Unit Tests (Pure Python)
      if: ${{ contains(inputs.os, 'ubuntu') }}
      shell: bash
      run: XDG_SESSION_TYPE=x11 xvfb-run pytest -n=8 --dist=worksteal -m "not cythonized_only" test
    - name: Prepare Compiled Module Tests
      shell: ${{ contains(inputs.os, 'windows') && 'pwsh' || 'bash' }}
      run: python setup.py build_ext --inplace
    - name: Unit Tests (Cython Modules)
      if: ${{ contains(inputs.os, 'windows') }}
      shell: cmd
      run: pytest -n=8 --dist=worksteal -m "cythonized or cythonized_only" test 2>NUL
    - name: Unit Tests (Cython Modules)
      if: ${{ contains(inputs.os, 'mac') }}
      shell: bash
      run: pytest -n=8 --dist=worksteal -m "cythonized or cythonized_only" test
    - name: Unit Tests (Cython Modules)
      if: ${{ contains(inputs.os, 'ubuntu') }}
      shell: bash
      run: XDG_SESSION_TYPE=x11 xvfb-run pytest -n=8 --dist=worksteal -m "cythonized or cythonized_only" test
